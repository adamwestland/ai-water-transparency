<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600&family=IBM+Plex+Sans:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #f8f7f4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'IBM Plex Sans', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .wordmark {
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 96px;
    background: linear-gradient(135deg, #2d6a9f, #4a9ead, #7bc47f, #e8c547, #e8845f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 28px;
    color: #666666;
    margin-top: 16px;
    letter-spacing: 0.01em;
  }

  .url {
    position: absolute;
    bottom: 40px;
    right: 48px;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: #999999;
  }
</style>
</head>
<body>
  <div class="wordmark">waterlens</div>
  <div class="subtitle">AI Water Transparency Report</div>
  <div class="url">waterlens.ai</div>
</body>
</html>
