name: Bug Report
description: Report a problem with the website or data
title: "[Bug] "
labels: ["bug"]
body:
  - type: checkboxes
    id: searched
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues first
          required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
  - type: input
    id: url
    attributes:
      label: Page URL
      placeholder: https://waterlens.ai/...
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / Device
      placeholder: e.g., Safari on iPhone 15, Chrome on Windows
    validations:
      required: false
